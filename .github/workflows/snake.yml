name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: suyash9466
          outputs: dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # 🔥 THIS LINE FIXES ERROR
          target_branch: output
          build_dir: dist
